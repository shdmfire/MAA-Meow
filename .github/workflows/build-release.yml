name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      maa_repo:
        description: 'MAA Core GitHub repo (owner/repo)'
        required: false
        default: 'MaaAssistantArknights/MaaAssistantArknights'
      maa_tag:
        description: 'MAA Core release tag'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - abi: all
            label: universal
          - abi: arm64-v8a
            label: arm64-v8a
          - abi: x86_64
            label: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;29.0.13113456" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OCR conversion deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Download and deploy MAA Core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_ARG=""
          MAA_TAG="${{ github.event.inputs.maa_tag }}"
          if [ -n "$MAA_TAG" ] && [ "$MAA_TAG" != "latest" ]; then
            TAG_ARG="--tag $MAA_TAG"
          fi
          REPO_ARG=""
          if [ -n "${{ github.event.inputs.maa_repo }}" ]; then
            REPO_ARG="--repo ${{ github.event.inputs.maa_repo }}"
          fi
          if [ "${{ matrix.abi }}" = "all" ]; then
            python scripts/setup_maa_core.py --clean $TAG_ARG $REPO_ARG
          else
            python scripts/setup_maa_core.py --clean --abi ${{ matrix.abi }} $TAG_ARG $REPO_ARG
          fi

      - name: Print MAA Resource version
        run: cat app/src/main/assets/MaaSync/MaaResource/version.json

      - name: Override ABI filter
        if: matrix.abi != 'all'
        run: |
          cat >> app/build.gradle.kts << 'EOF'

          android.defaultConfig.ndk.abiFilters.clear()
          android.defaultConfig.ndk.abiFilters += "${{ matrix.abi }}"
          EOF

      - name: Run modularization gate
        run: |
          chmod +x ./gradlew
          ./gradlew modularizationFastCheck

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          TAG="${GITHUB_REF_NAME:-dev}"
          for f in *.apk; do
            mv "$f" "MaaMeow-${TAG}-${{ matrix.label }}.apk"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ matrix.label }}
          path: app/build/outputs/apk/release/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate changelog
        run: |
          # 生成当前版本的 changelog（用于 Release body）
          git-cliff --current --strip header -o RELEASE_NOTES.md
          # 追加 Mirror酱 下载链接
          cat >> RELEASE_NOTES.md << 'EOF'

          ---

          [已有 Mirror酱 CDK？前往 Mirror酱 高速下载](https://mirrorchyan.com/zh/projects?rid=MAA&os=android&source=maagh-release)
          EOF

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-apk-*
          merge-multiple: true
          path: apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: apks/*.apk
          body_path: RELEASE_NOTES.md
