name: Build Dev APK

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      maa_repo:
        description: 'MAA Core GitHub repo (owner/repo)'
        required: false
        default: 'MaaAssistantArknights/MaaAssistantArknights'
      maa_tag:
        description: 'MAA Core release tag'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;29.0.13113456" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OCR conversion deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Download and deploy MAA Core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_ARG=""
          MAA_TAG="${{ github.event.inputs.maa_tag }}"
          if [ -n "$MAA_TAG" ] && [ "$MAA_TAG" != "latest" ]; then
            TAG_ARG="--tag $MAA_TAG"
          fi
          MAA_REPO="${{ github.event.inputs.maa_repo }}"
          REPO_ARG=""
          if [ -n "$MAA_REPO" ]; then
            REPO_ARG="--repo $MAA_REPO"
          fi
          python scripts/setup_maa_core.py --clean $TAG_ARG $REPO_ARG

      - name: Print MAA Resource version
        run: cat controller/maa-feature/src/main/assets/MaaSync/MaaResource/version.json

      - name: Run modularization gate
        run: |
          chmod +x ./gradlew
          ./gradlew modularizationFastCheck

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
